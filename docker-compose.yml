services:
  db:
    image: postgres:17-alpine
    container_name: phonebook-db
    restart: always
    environment:
      POSTGRES_DB: phonebook
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret1234
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d phonebook"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - phonebook-net

  app:
    build: .
    container_name: phonebook-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=admin
      - DB_PASSWORD=secret1234
    depends_on:
      db:
        condition: service_healthy
    networks:
      - phonebook-net

networks:
  phonebook-net:
    driver: bridge